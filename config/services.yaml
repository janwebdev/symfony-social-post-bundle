services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # HTTP Client
  Janwebdev\SocialPostBundle\Http\ClientInterface:
    class: Janwebdev\SocialPostBundle\Http\Client
    arguments:
      $httpClient: "@http_client"

  Janwebdev\SocialPostBundle\Http\Client:
    arguments:
      $httpClient: "@http_client"

  # Twitter Provider
  Janwebdev\SocialPostBundle\Provider\Twitter\TwitterClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $consumerKey: "%social_post.twitter.consumer_key%"
      $consumerSecret: "%social_post.twitter.consumer_secret%"
      $accessToken: "%social_post.twitter.access_token%"
      $accessTokenSecret: "%social_post.twitter.access_token_secret%"

  Janwebdev\SocialPostBundle\Provider\Twitter\TwitterProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\Twitter\TwitterClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.twitter.enabled%",
        }

  # Facebook Provider
  Janwebdev\SocialPostBundle\Provider\Facebook\FacebookClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $pageId: "%social_post.facebook.page_id%"
      $accessToken: "%social_post.facebook.access_token%"
      $graphVersion: "%social_post.facebook.graph_version%"

  Janwebdev\SocialPostBundle\Provider\Facebook\FacebookProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\Facebook\FacebookClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.facebook.enabled%",
        }

  # LinkedIn Provider
  Janwebdev\SocialPostBundle\Provider\LinkedIn\LinkedInClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $organizationId: "%social_post.linkedin.organization_id%"
      $accessToken: "%social_post.linkedin.access_token%"

  Janwebdev\SocialPostBundle\Provider\LinkedIn\LinkedInProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\LinkedIn\LinkedInClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.linkedin.enabled%",
        }

  # Telegram Provider
  Janwebdev\SocialPostBundle\Provider\Telegram\TelegramClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $botToken: "%social_post.telegram.bot_token%"
      $channelId: "%social_post.telegram.channel_id%"

  Janwebdev\SocialPostBundle\Provider\Telegram\TelegramProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\Telegram\TelegramClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.telegram.enabled%",
        }

  # Instagram Provider
  Janwebdev\SocialPostBundle\Provider\Instagram\InstagramClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $instagramAccountId: "%social_post.instagram.account_id%"
      $accessToken: "%social_post.instagram.access_token%"
      $graphVersion: "%social_post.instagram.graph_version%"

  Janwebdev\SocialPostBundle\Provider\Instagram\InstagramProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\Instagram\InstagramClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.instagram.enabled%",
        }

  # Discord Provider
  Janwebdev\SocialPostBundle\Provider\Discord\DiscordClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $webhookUrl: "%social_post.discord.webhook_url%"

  Janwebdev\SocialPostBundle\Provider\Discord\DiscordProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\Discord\DiscordClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.discord.enabled%",
        }

  # WhatsApp Provider
  Janwebdev\SocialPostBundle\Provider\WhatsApp\WhatsAppClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $phoneNumberId: "%social_post.whatsapp.phone_number_id%"
      $accessToken: "%social_post.whatsapp.access_token%"
      $apiVersion: "%social_post.whatsapp.api_version%"

  Janwebdev\SocialPostBundle\Provider\WhatsApp\WhatsAppProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\WhatsApp\WhatsAppClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.whatsapp.enabled%",
        }

  # Threads Provider
  Janwebdev\SocialPostBundle\Provider\Threads\ThreadsClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $userId: "%social_post.threads.user_id%"
      $accessToken: "%social_post.threads.access_token%"
      $apiVersion: "%social_post.threads.api_version%"

  Janwebdev\SocialPostBundle\Provider\Threads\ThreadsProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\Threads\ThreadsClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.threads.enabled%",
        }

  # Pinterest Provider
  Janwebdev\SocialPostBundle\Provider\Pinterest\PinterestClient:
    arguments:
      $httpClient: '@Janwebdev\SocialPostBundle\Http\ClientInterface'
      $boardId: "%social_post.pinterest.board_id%"
      $accessToken: "%social_post.pinterest.access_token%"

  Janwebdev\SocialPostBundle\Provider\Pinterest\PinterestProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\Pinterest\PinterestClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.pinterest.enabled%",
        }

  # HackerNews Provider
  Janwebdev\SocialPostBundle\Provider\HackerNews\HackerNewsClient:
    arguments:
      $httpClient: "@http_client"
      $username: "%social_post.hackernews.username%"
      $password: "%social_post.hackernews.password%"

  Janwebdev\SocialPostBundle\Provider\HackerNews\HackerNewsProvider:
    arguments:
      $client: '@Janwebdev\SocialPostBundle\Provider\HackerNews\HackerNewsClient'
      $logger: "@?logger"
    tags:
      - {
          name: "social_post.provider",
          enabled: "%social_post.hackernews.enabled%",
        }

  # Publisher
  Janwebdev\SocialPostBundle\Publisher\PublisherInterface:
    class: Janwebdev\SocialPostBundle\Publisher\Publisher
    public: true
    arguments:
      $providers: !tagged_iterator
        tag: "social_post.provider"
        default_index_method: "getName"
      $eventDispatcher: "@event_dispatcher"
      $messageBus: "@messenger.default_bus"
      $logger: "@?logger"

  Janwebdev\SocialPostBundle\Publisher\Publisher:
    public: true
    arguments:
      $providers: !tagged_iterator
        tag: "social_post.provider"
        default_index_method: "getName"
      $eventDispatcher: "@event_dispatcher"
      $messageBus: "@messenger.default_bus"
      $logger: "@?logger"

  # Messenger Handler
  Janwebdev\SocialPostBundle\Publisher\PublishMessageHandler:
    arguments:
      $publisher: '@Janwebdev\SocialPostBundle\Publisher\PublisherInterface'
    tags:
      - { name: "messenger.message_handler" }

  # Alias for easier access
  social_post.publisher:
    alias: Janwebdev\SocialPostBundle\Publisher\PublisherInterface
    public: true
